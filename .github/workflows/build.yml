name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac --universal
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: sudo apt-get update && sudo apt-get install -y libgbm-dev
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
